name: Sync Repo1 to dev
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Git config
        run: |
          git config --global user.name "jjjzzz666"
          git config --global user.email "jjjzzz666@users.noreply.github.com"
          git config --global lfs.allowincompletepush true

      # 自动创建并切换到 dev 分支
      - name: Create dev branch
        run: |
          git checkout -B dev

      - name: Update repo1
        run: |
          rm -rf openharmony-applications_app_samples
          mkdir -p temp
          curl -L https://github.com/openharmony/applications_app_samples/archive/refs/heads/master.tar.gz | tar xz --strip 1 -C temp
          find temp -size +10M -delete
          find temp -type d -empty -delete
          mv temp openharmony-applications_app_samples

      - name: Push to dev
        run: |
          git add .
          git commit -m "update repo1" || true
          git push origin dev --no-verify
